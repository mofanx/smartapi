# Mock 服务配置示例
routes:
  - path: "/api/login"
    method: POST
    status_code: 200
    body:
      code: 0
      msg: "success"
      data:
        token: "mock_token_abc123"
        expire: 3600
    rules:
      - condition:
          body.username: "admin"
          body.password: "123456"
        status_code: 200
        body:
          code: 0
          msg: "success"
          data:
            token: "admin_token_xyz"
            expire: 7200
      - condition:
          body.username: "invalid"
        status_code: 401
        body:
          code: 401
          msg: "用户名或密码错误"

  - path: "/api/user/info"
    method: GET
    status_code: 200
    body:
      code: 0
      data:
        id: 1
        username: "admin"
        phone: "13800138000"
        email: "admin@example.com"

  - path: "/api/user/{id}"
    method: GET
    status_code: 200
    body:
      code: 0
      data:
        id: 1
        username: "user"
    rules:
      - condition:
          params.id: "999"
        status_code: 404
        body:
          code: 404
          msg: "用户不存在"

  - path: "/api/orders"
    method: GET
    status_code: 200
    delay: 0.5
    body:
      code: 0
      data:
        total: 2
        items:
          - id: 1001
            product: "商品A"
            amount: 99.9
          - id: 1002
            product: "商品B"
            amount: 199.0
