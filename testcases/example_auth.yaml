# SmartAPI-Test 示例: 鉴权测试
name: "鉴权接口测试"
description: "演示 Bearer Token 鉴权流程"
tags:
  - auth
  - example
base_url: "https://httpbin.org"

steps:
  - id: "auth_bearer"
    name: "Bearer Token 鉴权测试"
    request:
      method: GET
      url: "/bearer"
      auth:
        type: bearer
        token: "my_test_token_123"
    asserts:
      - target: status_code
        operator: eq
        expected: 200
      - target: body
        expression: "$.authenticated"
        operator: eq
        expected: true
      - target: body
        expression: "$.token"
        operator: eq
        expected: "my_test_token_123"

  - id: "auth_basic"
    name: "Basic Auth 鉴权测试"
    request:
      method: GET
      url: "/basic-auth/admin/password123"
      auth:
        type: basic
        username: "admin"
        password: "password123"
    asserts:
      - target: status_code
        operator: eq
        expected: 200
      - target: body
        expression: "$.authenticated"
        operator: eq
        expected: true
