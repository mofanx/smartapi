# ============================================
# 示例02：POST JSON 请求
# 学习目标：掌握 POST 请求和 JSON 请求体
# ============================================
name: "POST JSON 请求"
description: "发送 JSON 请求体并验证响应"
base_url: "https://httpbin.org"
tags:
  - tutorial
  - beginner

steps:
  - name: "提交 JSON 数据"
    request:
      method: POST
      url: "/post"
      headers:
        Content-Type: "application/json"
        X-Custom-Header: "SmartAPI"
      body:
        username: "admin"
        email: "admin@example.com"
        age: 30
        roles:
          - "admin"
          - "editor"
    asserts:
      # 状态码
      - target: status_code
        operator: eq
        expected: 200

      # 验证提交的 JSON 被正确接收
      - target: body
        expression: "$.json.username"
        operator: eq
        expected: "admin"

      - target: body
        expression: "$.json.roles"
        operator: length_eq
        expected: 2

      # 验证自定义 Header 被正确发送
      - target: body
        expression: "$.headers.X-Custom-Header"
        operator: eq
        expected: "SmartAPI"
